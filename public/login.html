<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Login • HELIX</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;

background:#0b0b0b;

color:white;

font-family:Arial;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.card{

width:340px;

background:#171717;

padding:30px;

border-radius:20px;

}

h1{

text-align:center;

margin-bottom:25px;

}

input{

width:100%;

padding:14px;

margin-bottom:14px;

border:none;

border-radius:12px;

}

button{

width:100%;

padding:14px;

border:none;

border-radius:12px;

cursor:pointer;

}

.link{

text-align:center;

margin-top:15px;

}

a{

color:#888;

text-decoration:none;

}

</style>

</head>

<body>

<div class="card">

<h1>Entrar</h1>

<form id="loginForm">

<input
id="email"
type="email"
placeholder="Email"
required
>

<input
id="password"
type="password"
placeholder="Senha"
required
>

<button type="submit">

ENTRAR

</button>

</form>

<div class="link">

<a href="/register.html">

Criar conta

</a>

</div>

</div>

<script>

document
.getElementById(
"loginForm"
)

.addEventListener(

"submit",

async function(e){

e.preventDefault();

const email =
document
.getElementById(
"email"
)
.value;

const password =
document
.getElementById(
"password"
)
.value;

try{

const response =
await fetch(

"/api/login",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:
JSON.stringify({

email,
password

})

}

);

if(!response.ok){

alert(
"Email ou senha incorretos"
);

return;

}

const data =
await response.json();

localStorage.setItem(
"token",
data.token
);

window.location.href =
"/dashboard.html";

}catch{

alert(
"Erro ao conectar ao servidor"
);

}

}

);

</script>

</body>

</html>
