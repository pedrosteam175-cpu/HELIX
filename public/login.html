<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Login • HELIX</title>

<style>

body{

margin:0;

background:#080808;

color:white;

font-family:Arial;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.card{

width:320px;

background:#121212;

padding:30px;

border-radius:20px;

}

h1{

text-align:center;

}

input{

width:100%;

padding:12px;

margin:10px 0;

border:none;

border-radius:10px;

box-sizing:border-box;

}

button{

width:100%;

padding:12px;

border:none;

border-radius:10px;

cursor:pointer;

}

a{

color:#999;

text-decoration:none;

}

</style>

</head>

<body>

<div class="card">

<h1>Entrar</h1>

<form id="loginForm">

<input
id="email"
type="email"
placeholder="Email"
required
>

<input
id="password"
type="password"
placeholder="Senha"
required
>

<button type="submit">

Entrar

</button>

</form>

<br>

<div
style="text-align:center"
>

<a href="/register.html">

Criar conta

</a>

</div>

</div>

<script>

document
.getElementById(
"loginForm"
)

.addEventListener(

"submit",

async function(e){

e.preventDefault();

const email =
document
.getElementById(
"email"
)
.value;

const password =
document
.getElementById(
"password"
)
.value;

try{

const response =
await fetch(

"/api/login",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:
JSON.stringify({

email,
password

})

}

);

const data =
await response.json();

if(response.ok){

localStorage.setItem(
"token",
data.token
);

window.location.href =
"/dashboard.html";

}else{

alert(
data.error ||
"Falha no login"
);

}

}catch{

alert(
"Erro ao conectar"
);

}

}

);

</script>

</body>

</html>
