
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Entrar • HELIX</title>

<style>
body{
background:#080808;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
width:320px;
padding:30px;
background:#121212;
border-radius:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
}

a{
color:#888;
}
</style>

</head>

<body>

<div class="card">

<h1>Entrar</h1>

<form>

<input
type="email"
placeholder="Email"
required
>

<input
type="password"
placeholder="Senha"
required
>

<button type="submit">
Entrar
</button>

</form>

<br>

<a href="/register.html">
Criar conta
</a>

</div>

</body>
</html>
