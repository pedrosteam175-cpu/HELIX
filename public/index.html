<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HelixWin - Jogo de Habilidade</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080c10;
      --bg2: #0d1218;
      --card: #111820;
      --border: #1e2d3d;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --green: #00ff88;
      --red: #ff3b5c;
      --gold: #ffc400;
      --text: #e8f0f8;
      --muted: #6b8099;
      --font-display: 'Bebas Neue', sans-serif;
      --font-ui: 'Rajdhani', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5vw;
      height: 64px;
      background: rgba(8,12,16,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo img { height: 36px; object-fit: contain; }
    .nav-logo span {
      font-family: var(--font-display);
      font-size: 1.6rem;
      letter-spacing: 2px;
      color: var(--accent);
    }
    .nav-links { display: flex; gap: 12px; }
    .btn {
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 1px;
      padding: 8px 22px;
      border-radius: 4px;
      cursor: pointer;
      border: none;
      transition: all .2s;
      text-decoration: none;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent2), #5b21b6);
      color: #fff;
      box-shadow: 0 0 20px rgba(124,58,237,.4);
    }
    .btn-primary:hover { box-shadow: 0 0 30px rgba(124,58,237,.7); transform: translateY(-1px); }
    .btn-accent {
      background: linear-gradient(135deg, var(--accent), #0284c7);
      color: #000;
      font-weight: 800;
    }
    .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,229,255,.5); }
    .btn-green {
      background: linear-gradient(135deg, var(--green), #00c472);
      color: #000;
      font-weight: 800;
    }
    .btn-green:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,255,136,.4); }
    .btn-lg { font-size: 1.1rem; padding: 14px 36px; }
    .btn-full { width: 100%; display: block; text-align: center; padding: 14px; font-size: 1rem; }

    /* ─── PAGE SYSTEM ─── */
    .page { display: none; padding-top: 64px; }
    .page.active { display: block; }

    /* ─── HERO ─── */
    .hero {
      min-height: calc(100vh - 64px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 80px 5vw 60px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 20%, rgba(0,229,255,.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(124,58,237,.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(0,229,255,.08);
      border: 1px solid rgba(0,229,255,.2);
      border-radius: 100px;
      padding: 6px 18px;
      font-family: var(--font-ui);
      font-size: 0.85rem;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 28px;
      animation: fadeDown .6s ease both;
    }
    .hero-badge .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }

    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 10vw, 7rem);
      line-height: 1;
      letter-spacing: 3px;
      margin-bottom: 24px;
      animation: fadeUp .7s .1s ease both;
    }
    .hero h1 span { color: var(--accent); }

    .hero p {
      max-width: 560px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 40px;
      animation: fadeUp .7s .2s ease both;
    }

    .hero-cta {
      display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
      margin-bottom: 60px;
      animation: fadeUp .7s .3s ease both;
    }

    .hero-badges {
      display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
      animation: fadeUp .7s .4s ease both;
    }
    .hero-badges span {
      font-family: var(--font-ui);
      font-size: 0.8rem;
      color: var(--muted);
      display: flex; align-items: center; gap: 6px;
      letter-spacing: .5px;
    }
    .hero-badges span::before {
      content: '✓';
      color: var(--green);
      font-weight: 700;
    }

    /* ─── STATS BAR ─── */
    .stats-bar {
      display: flex; justify-content: center; gap: 0;
      flex-wrap: wrap;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .stat-item {
      flex: 1; min-width: 140px;
      padding: 24px 20px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: none; }
    .stat-num {
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: 1px;
      color: var(--accent);
    }
    .stat-label {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* ─── SECTIONS ─── */
    section { padding: 80px 5vw; }
    .section-tag {
      font-family: var(--font-ui);
      font-size: 0.8rem;
      letter-spacing: 3px;
      color: var(--accent);
      text-align: center;
      margin-bottom: 12px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 16px;
    }
    .section-sub {
      text-align: center;
      color: var(--muted);
      max-width: 500px;
      margin: 0 auto 60px;
      font-size: 0.95rem;
      line-height: 1.7;
    }

    /* ─── STEPS ─── */
    .steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      max-width: 960px;
      margin: 0 auto;
    }
    .step-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      position: relative;
      overflow: hidden;
      transition: border-color .3s, transform .3s;
    }
    .step-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
    }
    .step-card::before {
      content: attr(data-num);
      font-family: var(--font-display);
      font-size: 5rem;
      color: rgba(0,229,255,.06);
      position: absolute;
      top: -10px; right: 16px;
      line-height: 1;
    }
    .step-icon {
      width: 48px; height: 48px;
      border-radius: 10px;
      background: rgba(0,229,255,.1);
      border: 1px solid rgba(0,229,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 20px;
    }
    .step-card h3 {
      font-family: var(--font-ui);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 10px;
      color: var(--text);
    }
    .step-card p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }

    /* ─── CTA SECTION ─── */
    .cta-section {
      background: linear-gradient(135deg, rgba(124,58,237,.15), rgba(0,229,255,.08));
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      text-align: center;
      padding: 80px 5vw;
    }
    .cta-section h2 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    .cta-section h2 span { color: var(--accent); }
    .cta-section p { color: var(--muted); margin-bottom: 36px; }

    /* ─── FOOTER ─── */
    footer {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 60px 5vw 30px;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 40px;
      margin-bottom: 40px;
    }
    @media(max-width:768px) { .footer-grid { grid-template-columns: 1fr 1fr; } }
    .footer-brand p {
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.7;
      margin-top: 12px;
      max-width: 280px;
    }
    .footer-brand .brand-name {
      font-family: var(--font-display);
      font-size: 1.5rem;
      letter-spacing: 2px;
      color: var(--accent);
    }
    footer h4 {
      font-family: var(--font-ui);
      font-size: 0.8rem;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    footer ul { list-style: none; }
    footer ul li { margin-bottom: 10px; }
    footer ul li a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color .2s;
    }
    footer ul li a:hover { color: var(--accent); }
    .footer-bottom {
      border-top: 1px solid var(--border);
      padding-top: 24px;
      display: flex; justify-content: space-between; align-items: flex-start;
      flex-wrap: wrap; gap: 16px;
    }
    .footer-bottom p { color: var(--muted); font-size: 0.78rem; line-height: 1.6; }
    .footer-bottom .copy { font-size: 0.78rem; color: var(--muted); }

    /* ─── AUTH PAGES ─── */
    .auth-wrap {
      min-height: calc(100vh - 64px);
      display: flex; align-items: center; justify-content: center;
      padding: 40px 5vw;
    }
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
    }
    .auth-card h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .auth-card .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-family: var(--font-ui);
      font-size: 0.8rem;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .form-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .form-link a { color: var(--accent); text-decoration: none; }

    /* ─── DASHBOARD ─── */
    .dashboard { padding: 30px 5vw 80px; }
    .dashboard-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
    }
    .welcome {
      font-family: var(--font-display);
      font-size: 1.8rem;
      letter-spacing: 2px;
    }
    .welcome span { color: var(--accent); }
    .balance-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .balance-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 20px;
    }
    .balance-card .label {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .balance-card .amount {
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: 1px;
    }
    .balance-card.main .amount { color: var(--green); }
    .balance-card.wins .amount { color: var(--gold); }

    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media(max-width:700px) { .dash-grid { grid-template-columns: 1fr; } }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .panel h3 {
      font-family: var(--font-ui);
      font-size: 0.85rem;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* ─── GAME PANEL ─── */
    .game-panel {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 5vw 80px;
    }
    .game-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .game-header h2 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      letter-spacing: 2px;
    }
    .game-balance {
      font-family: var(--font-ui);
      font-size: 1rem;
      color: var(--muted);
    }
    .game-balance span { color: var(--green); font-size: 1.3rem; font-weight: 700; }

    .game-canvas-wrap {
      background: #000;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      width: 100%;
      aspect-ratio: 9/16;
      max-height: 540px;
      margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
    }
    canvas#helixCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .game-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(8,12,16,.9);
      z-index: 10;
      text-align: center;
      padding: 32px;
    }
    .game-overlay h3 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      letter-spacing: 3px;
      margin-bottom: 12px;
    }
    .game-overlay p { color: var(--muted); margin-bottom: 28px; }
    .game-overlay.hidden { display: none; }

    .bet-controls {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap;
    }
    .bet-group { flex: 1; min-width: 140px; }
    .bet-group label {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      color: var(--muted);
      display: block; margin-bottom: 8px;
    }
    .bet-input-wrap { position: relative; }
    .bet-input-wrap span {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-family: var(--font-ui); font-weight: 700;
    }
    .bet-input-wrap input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px 12px 30px;
      color: var(--text);
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: 1px;
      outline: none;
      transition: border-color .2s;
    }
    .bet-input-wrap input:focus { border-color: var(--accent); }
    .quick-bets { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .quick-bet {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .quick-bet:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── SAQUE (sem exigência de depósito) ─── */
    .withdraw-form { max-width: 480px; }
    .info-box {
      background: rgba(0,255,136,.06);
      border: 1px solid rgba(0,255,136,.2);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: var(--green);
      display: flex; gap: 10px; align-items: flex-start;
    }
    .info-box .icon { flex-shrink: 0; font-size: 1rem; margin-top: 1px; }

    /* ─── HISTORY TABLE ─── */
    .history-table { width: 100%; border-collapse: collapse; }
    .history-table th {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      letter-spacing: 1px;
      color: var(--muted);
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .history-table td {
      padding: 12px 12px;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(30,45,61,.5);
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-family: var(--font-ui);
      font-size: 0.72rem;
      letter-spacing: .5px;
    }
    .badge-win  { background: rgba(0,255,136,.12); color: var(--green); }
    .badge-loss { background: rgba(255,59,92,.12);  color: var(--red); }
    .badge-pend { background: rgba(255,196,0,.12);  color: var(--gold); }

    /* ─── NOTIFY TOAST ─── */
    #toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: 8px;
      padding: 14px 20px;
      font-size: 0.9rem;
      max-width: 320px;
      transform: translateX(120%);
      transition: transform .3s ease;
    }
    #toast.show { transform: translateX(0); }

    /* ─── HELIX GAME ─── */
    #helixCanvas { background: #000; }

    @media(max-width:600px) {
      .auth-card { padding: 32px 24px; }
      nav { padding: 0 16px; }
      section { padding: 60px 16px; }
      .steps { grid-template-columns: 1fr; }
      .bet-controls { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ NAV ═══════════════ -->
<nav>
  <a class="nav-logo" href="#" onclick="showPage('home')">
    <img src="https://helix777.fun/uploads/branding/site-logo.png"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"
         alt="Logo" />
    <span style="display:none">HELIXWIN</span>
  </a>
  <div class="nav-links" id="navLinks">
    <a class="btn btn-ghost" href="#" onclick="showPage('login')">LOGIN</a>
    <a class="btn btn-primary" href="#" onclick="showPage('register')">CADASTRAR</a>
  </div>
</nav>

<!-- ═══════════════ HOME PAGE ═══════════════ -->
<div id="page-home" class="page active">
  <div class="hero">
    <div class="hero-badge">
      <span class="dot"></span>
      <span id="onlineCount">2.847</span> JOGADORES ONLINE AGORA
    </div>
    <h1>JOGO DE <span>HABILIDADE</span></h1>
    <p>Domine a hélice, supere os obstáculos e multiplique seu capital na primeira plataforma Helix Jump com tecnologia de pagamentos instantâneos.</p>
    <div class="hero-cta">
      <a class="btn btn-ghost btn-lg" href="#" onclick="showPage('game')">JOGAR DEMO</a>
      <a class="btn btn-accent btn-lg" href="#" onclick="showPage('game')">ENTRAR NA CONTA →</a>
    </div>
    <div class="hero-badges">
      <span>SAQUE PIX</span>
      <span>SEM DEPÓSITO MÍNIMO</span>
      <span>AUDITORIA REAL</span>
