<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 Roleta Bet - Aposte e Ganhe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Login/Registro -->
        <div id="authScreen" class="screen active">
            <div class="logo">
                <div class="roleta-icon">🎰</div>
                <h1>Roleta Bet</h1>
                <p>Aposte e Ganhe!</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab active" data-tab="login">Login</button>
                <button class="tab" data-tab="register">Cadastro</button>
            </div>
            
            <form id="loginForm" class="auth-form">
                <input type="text" name="login" placeholder="Usuário ou Email" required>
                <input type="password" name="password" placeholder="Senha" required>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            
            <form id="registerForm" class="auth-form hidden">
                <input type="text" name="username" placeholder="Usuário" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Senha" required>
                <button type="submit" class="btn-primary">Cadastrar</button>
            </form>
        </div>
        
        <!-- Menu Principal -->
        <div id="menuScreen" class="screen">
            <header>
                <div class="user-info">
                    <span class="username" id="displayUsername">Usuário</span>
                    <span class="saldo">R$ <span id="displaySaldo">0,00</span></span>
                </div>
                <button class="btn-logout" onclick="logout()">Sair</button>
            </header>
            
            <div class="menu-cards">
                <div class="card" onclick="showRoulette()">
                    <div class="icon">🎰</div>
                    <h3>Roleta</h3>
                    <p>Aposte e ganhe</p>
                </div>
                
                <div class="card" onclick="showDeposito()">
                    <div class="icon">💰</div>
                    <h3>Depositar</h3>
                    <p>Via PIX</p>
                </div>
                
                <div class="card" onclick="showSaque()">
                    <div class="icon">🏧</div>
                    <h3>Sacar</h3>
                    <p>Para sua conta</p>
                </div>
                
                <div class="card" onclick="showHistorico()">
                    <div class="icon">📊</div>
                    <h3>Histórico</h3>
                    <p>Suas transações</p>
                </div>
            </div>
        </div>
        
        <!-- Roleta -->
        <div id="roletaScreen" class="screen">
            <header>
                <button class="btn-back" onclick="showMenu()">← Voltar</button>
                <h2>🎰 Roleta</h2>
                <div class="saldo">R$ <span id="roletaSaldo">0,00</span></div>
            </header>
            
            <div class="roleta-container">
                <div class="roleta" id="roleta">
                    <div class="bola"></div>
                </div>
                
                <div class="resultado" id="resultado">
                    <span class="numero" id="resultNumero">-</span>
                    <span class="cor" id="resultCor">-</span>
                </div>
            </div>
            
            <div class="apostas">
                <h3>Tipos de Aposta</h3>
                
                <div class="tipos-aposta">
                    <button class="tipo-btn active" data-tipo="cor">
                        <span class="vermelho">🔴</span> / <span class="preto">⚫</span>
                        <small>2x</small>
                    </button>
                    <button class="tipo-btn" data-tipo="par">
                        Par <small>2x</small>
                    </button>
                    <button class="tipo-btn" data-tipo="impar">
                        Ímpar <small>2x</small>
                    </button>
                    <button class="tipo-btn" data-tipo="maior">
                        19-36 <small>2x</small>
                    </button>
                    <button class="tipo-btn" data-tipo="menor">
                        1-18 <small>2x</small>
                    </button>
                    <button class="tipo-btn" data-tipo="numero">
